name: Apply MPZ v9.4 detailed-balance plasticity

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-v9.4-detailed-balance.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply source patch
        run: python payload/apply_v94_detailed_balance.py

      - name: Add v9.4 notes
        shell: bash
        run: |
          cat > CHANGELOG_MPZ_V9_4.md <<'EOF'
          # MPZ v9.4 changelog

          - Restored signed detailed-balance Peierls kinetics: net glide is forward minus zero-stress reverse rate and is exactly zero at zero stress.
          - Applied the same forward/reverse subtraction to correlated Taylor completion before forming the sequential Peierls–Taylor rate.
          - Added rejection for a zero-stress plastic ratchet and for non-positive unclamped scaled barriers.
          - Narrowed the plastic temperature-slope multiplier search to 0.25–8 and reduced the broad maximum-stress screen to 40 GPa.
          - Retained the no-total-density-cap and high-density monotonicity requirements.
          - The v9.3 v2 shortlist is retained only as an audit demonstrating why detailed balance is required.
          EOF

      - name: Install and test
        run: |
          python -m pip install -e '.[dev]'
          python -m compileall -q \
            arrhenius_fracture \
            prepare_mpz_v9_3_pt_input.py \
            search_mpz_peierls_taylor_parameters.py
          python -m pytest -q \
            tests/test_emission_derived_peierls_taylor.py \
            tests/test_bulk_pt_plasticity.py \
            tests/test_moving_process_zone.py \
            tests/test_prepare_mpz_v9_3_pt_input.py
          python - <<'PY'
          import arrhenius_fracture as af
          assert af.__version__ == '0.9.4'
          print('package version:', af.__version__)
          PY

      - name: Run detailed-balance PT smoke
        shell: bash
        run: |
          cat > /tmp/pt_search_input.csv <<'CSV'
          candidate_id,region,shape_family,Kdot_MPa_sqrt_m_per_s,ceramic_score,weakT_score,DBTT_precursor_score,refined_Kc_T300,refined_Kc_T1200,emit_G00_eV,emit_gT_eV_per_K,emit_sigc0_GPa,emit_sT_GPa_per_K,emit_exp_a,emit_exp_n,emit_floor_frac
          c1,ceramic_intrinsic,ceramic,0.005,0.1,9,9,18,7,2.8,0.002,5.0,0.0,0.35,1.1,0.04
          w1,weakT_intrinsic,weakT,0.005,9,0.1,9,15,15,2.2,0.002,4.0,0.0,0.50,0.9,0.03
          d1,DBTT_precursor,DBTT,0.005,9,9,0.1,15,10,2.5,0.001,4.5,0.0,0.20,1.0,0.035
          CSV
          python search_mpz_peierls_taylor_parameters.py \
            --atlas-shortlist /tmp/pt_search_input.csv \
            --transport-samples 16 \
            --intrinsic-top-per-region 1 \
            --top-per-intrinsic 1 \
            --temperatures '300 700 1200' \
            --strain-rates '1e-5 1e-3' \
            --rho-points 25 \
            --max-stress-GPa 40 \
            --out runs/ci_pt_v94_smoke
          test -s runs/ci_pt_v94_smoke/peierls_taylor_search_summary.csv

      - name: Commit complete v9.4 source
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm -rf arrhenius_fem_czm.egg-info
          rm -rf payload/apply_v94_detailed_balance.py
          rm -f .github/workflows/apply-v9.4-detailed-balance.yml
          git add -A
          git commit -m 'Restore detailed-balance Peierls-Taylor kinetics v9.4'
          git push origin HEAD:main
