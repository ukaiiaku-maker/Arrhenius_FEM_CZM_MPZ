name: v10.0.5.7 FEM-CZM consistency CI

on:
  pull_request:
    branches:
      - v10.0.5.6-kj-audit-first-passage-bracket
  push:
    branches:
      - v10.0.5.7-v912-gate-fixedgrip-consistency

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .
          python -m pip install pytest
      - name: Compile
        run: python -m compileall -q arrhenius_fracture *.py scripts
      - name: Full regression suite
        id: full
        shell: bash
        run: |
          set +e
          python -m pytest -q --tb=short 2>&1 | tee full_pytest.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit $status
      - name: Focused v10.0.5.7 gates
        if: always()
        id: focused
        shell: bash
        run: |
          set +e
          python -m pytest -q --tb=short \
            tests/test_material_rcurve_audit_v9121.py \
            tests/test_mpz_v9_12_1_runner.py \
            tests/test_kj_fixed_grip_v10057.py \
            tests/test_field_snapshots_v9121.py \
            2>&1 | tee focused_pytest.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit $status
      - name: Upload test transcripts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v10057-test-transcripts-${{ github.run_id }}
          path: |
            full_pytest.log
            focused_pytest.log
          if-no-files-found: error
