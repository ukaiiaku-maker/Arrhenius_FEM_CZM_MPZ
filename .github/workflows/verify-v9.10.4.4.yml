name: Verify MPZ v9.10.4.4 state-change stepping

on:
  push:
    branches: [v9.10.4.4-state-change-timestep]
  pull_request:
    branches: [v9.10.4.3-dynamic-transition-refinement, v9.10.4.2-audit-transition-guard, main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install package and test dependencies
        run: python -m pip install -e '.[dev]'
      - name: Compile state-change guard and audit
        run: |
          python -m compileall -q \
            arrhenius_fracture/reduced_campaign_front_v91044_timestep_guard.py \
            audit_mpz_v9_10_4_4_current_dbtt.py
          bash -n scripts/run_mpz_v9_10_4_stage0_audit.sh
      - name: Run focused reduced-front tests
        run: |
          python -m pytest -q \
            tests/test_mpz_v9_10_4_reduced_front.py \
            tests/test_mpz_v9_10_4_timestep_guard.py \
            tests/test_mpz_v9_10_4_3_count_timestep.py \
            tests/test_mpz_v9_10_4_3_dynamic_schedule.py \
            tests/test_mpz_v9_10_4_3_refined_metrics.py \
            tests/test_mpz_v9_10_4_3_audit_probe.py \
            tests/test_mpz_v9_10_4_4_state_change_timestep.py
      - name: Check package version
        run: |
          python - <<'PY'
          import arrhenius_fracture
          assert arrhenius_fracture.__version__ == '0.9.10.4.4'
          print(arrhenius_fracture.__version__)
          PY
