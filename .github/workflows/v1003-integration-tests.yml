name: v10.0.3.1 integration and reporting tests

on:
  push:
    branches:
      - v10.0.3-progressive-integration-audit
      - v10.0.3.1-reporting-normalization
  pull_request:
    branches:
      - v10.0.2-pf-equivalent-event-lifecycle
      - v10.0.3-progressive-integration-audit
    paths:
      - "arrhenius_fracture/**"
      - "tests/**"
      - "audit_v10_0_3_progressive_integration.py"
      - "normalize_v10_0_3_1_reporting.py"
      - "run_v10_0_3_integration_tests.sh"
      - "run_v10_0_3_progressive_integration_smoke.sh"
      - "run_v10_0_3_1_normalize_existing_output.sh"
      - "pyproject.toml"
      - ".github/workflows/v1003-integration-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests-only:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest

      - name: Check runner syntax
        run: |
          bash -n run_v10_0_3_integration_tests.sh
          bash -n run_v10_0_3_progressive_integration_smoke.sh
          bash -n run_v10_0_3_1_normalize_existing_output.sh

      - name: Run tests-only integration and reporting gate
        id: integration_tests
        env:
          CONDA_DEFAULT_ENV: arrhenius-fem-czm
          PYTHON_BIN: python
        shell: bash
        run: |
          set +e
          set -o pipefail
          bash run_v10_0_3_integration_tests.sh 2>&1 | tee v10031-integration-tests.log
          status=${PIPESTATUS[0]}
          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Upload complete test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v10031-integration-tests-log
          path: v10031-integration-tests.log
          if-no-files-found: error
