name: v10 kinetic CZM foundation

on:
  push:
    branches:
      - v10.0-pf-equivalent-kinetic-czm
  workflow_dispatch:

jobs:
  foundation:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Compile
        run: python -m compileall -q arrhenius_fracture
      - name: Focused tests
        run: |
          python -m pytest -q \
            tests/test_pf_equivalent_manifest_v10.py \
            tests/test_kinetic_campaign_czm_v10.py \
            tests/test_cohesive_trial_state_v10.py \
            tests/test_kinetic_cohesive_stepper_v10.py \
            tests/test_progressive_run_2d_transform_v10.py
      - name: Isolated prescribed-K traces
        run: |
          for material in ceramic weakT DBTT; do
            python -m arrhenius_fracture.kinetic_campaign_parity \
              --material "$material" \
              --out "runs/ci_isolated_${material}"
          done
      - name: Upload foundation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v10-kinetic-czm-foundation
          path: runs/ci_isolated_*
          if-no-files-found: warn
