name: Verify MPZ v9.6 through v9.10.3

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install package and test dependencies
        run: python -m pip install -e '.[dev]'
      - name: Compile updated sources
        run: |
          python -m compileall -q \
            arrhenius_fracture \
            build_mpz_analytic_first_passage_atlas.py \
            prepare_mpz_v9_3_pt_input.py \
            prepare_mpz_v9_6_canonical_proxies.py \
            search_mpz_peierls_taylor_parameters.py \
            search_mpz_peierls_taylor_parameters_v94.py \
            search_mpz_v9_4_developed_state.py \
            audit_mpz_v9_5_state_continuation.py \
            audit_mpz_v9_6_uncapped_pt.py \
            search_mpz_v9_6_broad_dbtt_map.py \
            calibrate_mpz_v9_7_pt_entropy.py \
            optimize_mpz_v9_8_joint_response.py \
            optimize_mpz_v9_8_1_joint_response.py \
            continue_mpz_v9_9_barrier_scale.py \
            continue_mpz_v9_9_1_barrier_scale.py \
            promote_mpz_v9_9_spatial.py \
            optimize_mpz_v9_10_unified_global.py \
            optimize_mpz_v9_10_1_shared_shape_global.py \
            optimize_mpz_v9_10_2_independent_shape_global.py \
            optimize_mpz_v9_10_3_dbtt_targeted_global.py \
            promote_mpz_v9_10_spatial.py \
            promote_mpz_v9_10_2_spatial.py \
            fit_mpz_three_classes.py
      - name: Run focused regression tests
        run: |
          python -m pytest -q \
            tests/test_moving_process_zone.py \
            tests/test_moving_process_zone_v95.py \
            tests/test_mpz_three_class_fit.py \
            tests/test_mpz_analytic_first_passage_atlas.py \
            tests/test_emission_derived_peierls_taylor.py \
            tests/test_emission_derived_peierls_taylor_v96.py \
            tests/test_emission_derived_peierls_taylor_v97.py \
            tests/test_bulk_pt_plasticity.py \
            tests/test_prepare_mpz_v9_3_pt_input.py \
            tests/test_prepare_mpz_v9_6_canonical_proxies.py \
            tests/test_pt_search_v94_wrapper.py \
            tests/test_mpz_v9_4_developed_state_search.py \
            tests/test_mpz_v9_8_joint_optimizer.py \
            tests/test_mpz_v9_9_barrier_continuation.py \
            tests/test_mpz_v9_9_1_metadata_wrapper.py \
            tests/test_mpz_v9_10_unified_transport.py \
            tests/test_mpz_v9_10_1_shared_shape.py \
            tests/test_mpz_v9_10_2_independent_shapes.py \
            tests/test_mpz_v9_10_3_dbtt_targeted.py
      - name: Run joined-input Peierls-Taylor search smoke
        shell: bash
        run: |
          cat > /tmp/pt_atlas.csv <<'CSV'
          candidate_id,region,shape_family,Kdot_MPa_sqrt_m_per_s,ceramic_score,weakT_score,DBTT_precursor_score,refined_Kc_T300,refined_Kc_T1200,emit_G00_eV,emit_gT_eV_per_K,emit_sigc0_GPa
          c1,ceramic_intrinsic,ceramic,0.005,0.1,9,9,18,7,1.3922,0.0091197,2.9802
          w1,weakT_intrinsic,weakT,0.005,9,0.1,9,15,15,1.1173,0.0063971,0.9506
          d1,DBTT_precursor,DBTT,0.005,9,9,0.1,15,10,1.6954,0.0008853,3.7521
          CSV
          cat > /tmp/pt_materials.csv <<'CSV'
          analytic_candidate_id,analytic_region,analytic_shape_family,emit_G00_eV,emit_gT_eV_per_K,emit_sigc0_GPa,emit_sT_GPa_per_K,emit_exp_a,emit_exp_n,emit_floor_frac
          c1,ceramic_intrinsic,ceramic,1.3922,0.0091197,2.9802,0.002031,0.2383,1.1169,0.041
          w1,weakT_intrinsic,weakT,1.1173,0.0063971,0.9506,0.0009817,0.5055,0.8432,0.0309
          d1,DBTT_precursor,DBTT,1.6954,0.0008853,3.7521,0.0022809,0.0944,0.835,0.03524
          CSV
          python prepare_mpz_v9_3_pt_input.py \
            --atlas-shortlist /tmp/pt_atlas.csv \
            --material-rows /tmp/pt_materials.csv \
            --out /tmp/pt_search_input.csv
          python search_mpz_peierls_taylor_parameters_v94.py \
            --atlas-shortlist /tmp/pt_search_input.csv \
            --transport-samples 16 \
            --intrinsic-top-per-region 1 \
            --top-per-intrinsic 1 \
            --temperatures '300 700 1200' \
            --strain-rates '1e-5 1e-3' \
            --rho-points 25 \
            --max-stress-GPa 40 \
            --out runs/ci_pt_search_smoke
          test -s runs/ci_pt_search_smoke/peierls_taylor_search_summary.csv
