name: Verify MPZ v9.10.4.2 audit transition guard

on:
  push:
    branches: [v9.10.4.2-audit-transition-guard]
  pull_request:
    branches: [v9.10.4.1-audit-progress, v9.10.4-narrow-dbtt-kinetic-search, main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install package and test dependencies
        run: python -m pip install -e '.[dev]'
      - name: Compile audit transition-guard sources
        run: |
          python -m compileall -q \
            arrhenius_fracture/reduced_campaign_front_v9104.py \
            arrhenius_fracture/reduced_campaign_front_v9104_timestep_guard.py \
            audit_mpz_v9_10_4_current_dbtt.py \
            audit_mpz_v9_10_4_2_current_dbtt.py
          bash -n scripts/run_mpz_v9_10_4_stage0_audit.sh
      - name: Run focused reduced-front and audit tests
        run: |
          python -m pytest -q \
            tests/test_mpz_v9_10_4_reduced_front.py \
            tests/test_mpz_v9_10_4_timestep_guard.py \
            tests/test_mpz_v9_10_4_2_audit_transition_guard.py
      - name: Check package version
        run: |
          python - <<'PY'
          import arrhenius_fracture
          assert arrhenius_fracture.__version__ == '0.9.10.4.2'
          print(arrhenius_fracture.__version__)
          PY
