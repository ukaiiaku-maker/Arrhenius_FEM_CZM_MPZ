name: Verify MPZ v9.10.4.5 search result schema

on:
  push:
    branches: [v9.10.4.5-search-result-schema]
  pull_request:
    branches: [v9.10.4.4-state-change-timestep, v9.10.4.3-dynamic-transition-refinement, main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install package and tests
        run: python -m pip install -e '.[dev]'
      - name: Compile wrapper and runner
        run: |
          python -m compileall -q optimize_mpz_v9_10_4_5_narrow_dbtt.py
          bash -n scripts/run_mpz_v9_10_4_first_passage_search.sh
      - name: Run schema regression and reduced-front tests
        run: |
          python -m pytest -q \
            tests/test_mpz_v9_10_4_5_search_result_schema.py \
            tests/test_mpz_v9_10_4_4_state_change_timestep.py \
            tests/test_mpz_v9_10_4_3_dynamic_schedule.py \
            tests/test_mpz_v9_10_4_3_refined_metrics.py
      - name: Check package version
        run: |
          python - <<'PY'
          import arrhenius_fracture
          assert arrhenius_fracture.__version__ == '0.9.10.4.5'
          print(arrhenius_fracture.__version__)
          PY
