name: Verify full 2-D MPZ v9.13

on:
  push:
    branches: [v9.13-deterministic-transfer-hardened-gate]
  pull_request:
    branches: [v9.12-full-field-material-rcurve]

jobs:
  verify-v913:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Compile and verify v9.13
        run: |
          python -m compileall -q \
            arrhenius_fracture/material_rcurve_audit_v913.py \
            arrhenius_fracture/field_snapshots_v913.py \
            arrhenius_fracture/mode_i_first_passage_v9_13.py \
            run_mpz_v9_13_mode_i_rcurve.py \
            run_mpz_v9_13_deterministic_material_transfer.py \
            verify_mpz_v9_13_install.py
          bash -n run_mpz_v9_13_deterministic_material_transfer_700K.sh
          python verify_mpz_v9_13_install.py .
      - name: Test v9.13 bookkeeping, gate, and field output
        run: |
          python -m pytest -q \
            tests/test_material_rcurve_audit_v913.py \
            tests/test_mpz_v9_13_runner.py \
            tests/test_field_snapshots_v913.py
      - name: Run inherited v9.12 and v9.11 integration tests
        run: |
          python -m pytest -q \
            tests/test_material_rcurve_audit_v912.py \
            tests/test_mpz_v9_12_runner.py \
            tests/test_v912_paper_transfer_contract.py \
            tests/test_stochastic_kinetics_v911.py \
            tests/test_rcurve_postprocess_v911.py \
            tests/test_mode_i_first_passage_v9_11.py \
            tests/test_mpz_v9_11_2d_coupling.py
