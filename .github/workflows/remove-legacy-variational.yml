name: Remove legacy variational fracture subsystem

permissions:
  contents: write

on:
  push:
    branches:
      - v10.0.5.7-v912-gate-fixedgrip-consistency

jobs:
  remove:
    if: ${{ !contains(github.event.head_commit.message, '[legacy-cleanup]') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .
          python -m pip install pytest
      - name: Remove legacy subsystem
        shell: bash
        run: |
          cat .cleanup/chunk_00.txt .cleanup/chunk_01.txt .cleanup/chunk_02.txt .cleanup/chunk_03.txt .cleanup/chunk_04.txt > /tmp/cleanup_payload.b64
          python - <<'PY'
          from pathlib import Path
          Path('/tmp/cleanup_payload.b64').write_bytes(
              Path('/tmp/cleanup_payload.b64').read_bytes()
              + bytes.fromhex(Path('.cleanup/chunk_05.hex').read_text().strip())
          )
          PY
          base64 --decode /tmp/cleanup_payload.b64 | gzip --decompress > /tmp/remove_legacy_variational.py
          python /tmp/remove_legacy_variational.py
          rm -rf .cleanup
      - name: Compile and test cleaned tree
        run: |
          python -m compileall -q arrhenius_fracture *.py scripts
          PYTHONPATH=$PWD python -m pytest -q --tb=short
      - name: Commit cleaned tree
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          git commit -m "Remove legacy variational fracture subsystem [legacy-cleanup]"
          git push origin HEAD:v10.0.5.7-v912-gate-fixedgrip-consistency
