name: Verify full 2-D MPZ v9.14

on:
  push:
    branches: [v9.14-event-remesh-conservative-transfer]
  pull_request:
    branches: [v9.13-deterministic-transfer-hardened-gate]

jobs:
  verify-v914:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Compile and verify v9.14
        run: |
          python -m compileall -q \
            arrhenius_fracture/event_remesh_czm_v914.py \
            arrhenius_fracture/event_equilibrium_v914.py \
            arrhenius_fracture/event_remesh_audit_v914.py \
            arrhenius_fracture/mode_i_first_passage_v9_14.py \
            run_mpz_v9_14_mode_i_rcurve.py \
            run_mpz_v9_14_event_remesh_gate.py \
            verify_mpz_v9_14_install.py
          bash -n run_mpz_v9_14_event_remesh_700K.sh
          python verify_mpz_v9_14_install.py .
      - name: Test conservative remesh and same-load equilibrium
        run: |
          python -m pytest -q \
            tests/test_event_remesh_czm_v914.py \
            tests/test_event_equilibrium_v914.py \
            tests/test_event_remesh_audit_v914.py \
            tests/test_mpz_v9_14_runner.py
      - name: Full FEM/CZM one-event remesh smoke
        id: full_smoke
        run: |
          set +e
          python run_mpz_v9_14_event_remesh_gate.py \
            --classes ceramic \
            --seeds 1 \
            --T-K 700 \
            --target-extension-um 5 \
            --steps 350 \
            --nx 18 --ny 36 \
            --tip-h-fine 2e-6 \
            --tip-ratio 1.25 \
            --dU 4e-7 --dt 16.8 \
            --adaptive-event-target 0.05 \
            --event-remesh-target-h-m 2e-6 \
            --event-remesh-patch-radius-um 15 \
            --event-remesh-max-edge-splits 64 \
            --save-snapshots 2 \
            --snapshot-cols 2 \
            --snapshot-by-extension-um 5 \
            --outroot runs/ci_v914_one_event \
            --no-skip-existing \
            > runs_v914_smoke.log 2>&1
          solver_rc=$?
          tail -n 120 runs_v914_smoke.log
          python - <<'PY'
          import json
          from pathlib import Path
          p = Path('runs/ci_v914_one_event/event_remesh_campaign_audit_v914.json')
          if not p.exists():
              raise SystemExit('missing event_remesh_campaign_audit_v914.json')
          data = json.loads(p.read_text())
          print(json.dumps(data, indent=2, default=str))
          case = data['cases'][0]
          assert case['n_remeshed_events'] >= 1, data
          assert case['numerical_event_remesh_gate_passed'], data
          PY
          audit_rc=$?
          if [[ $solver_rc -ne 0 || $audit_rc -ne 0 ]]; then
            exit 1
          fi
      - name: Preserve event-remesh smoke outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v914-one-event-smoke-${{ github.run_id }}
          path: |
            runs_v914_smoke.log
            runs/ci_v914_one_event
          if-no-files-found: warn
          retention-days: 7
      - name: Run inherited v9.13, v9.12 and v9.11 integration tests
        run: |
          python -m pytest -q \
            tests/test_material_rcurve_audit_v913.py \
            tests/test_mpz_v9_13_runner.py \
            tests/test_field_snapshots_v913.py \
            tests/test_material_rcurve_audit_v912.py \
            tests/test_stochastic_kinetics_v911.py \
            tests/test_rcurve_postprocess_v911.py \
            tests/test_mode_i_first_passage_v9_11.py \
            tests/test_mpz_v9_11_2d_coupling.py
