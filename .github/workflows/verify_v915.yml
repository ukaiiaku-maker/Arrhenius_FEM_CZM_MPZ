name: Verify full 2-D MPZ v9.15

on:
  push:
    branches: [v9.15-coupled-cohesive-mpz-relaxation]
  pull_request:
    branches: [v9.14-event-driven-remeshed-czm]

jobs:
  verify-v915:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Test coupled event relaxation
        run: |
          python -m pytest -q tests/test_coupled_event_relaxation_v915.py
          bash -n run_mpz_v9_15_coupled_relaxation_700K.sh
      - name: Inherited remesh and field tests
        run: |
          python -m pytest -q \
            tests/test_event_driven_remesh_v914.py \
            tests/test_event_hook_v914.py \
            tests/test_material_rcurve_audit_v913.py \
            tests/test_field_snapshots_v913.py
