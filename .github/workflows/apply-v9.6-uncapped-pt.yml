name: Apply MPZ v9.6 uncapped PT

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-v9.6-uncapped-pt.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply v9.6 activation and search fixes
        run: python payload/apply_v96_uncapped.py

      - name: Install and compile
        run: |
          python -m pip install -e '.[dev]'
          python -m compileall -q \
            arrhenius_fracture \
            audit_mpz_v9_6_uncapped_pt.py \
            search_mpz_v9_6_broad_dbtt_map.py

      - name: Run focused tests
        run: |
          python -m pytest -q \
            tests/test_emission_derived_peierls_taylor_v96.py \
            tests/test_emission_derived_peierls_taylor.py \
            tests/test_bulk_pt_plasticity.py \
            tests/test_moving_process_zone_v95.py \
            tests/test_moving_process_zone.py
          python - <<'PY'
          import numpy as np
          import arrhenius_fracture as af
          from arrhenius_fracture.emission_derived_plasticity import (
              EmissionDerivedPeierlsTaylorConfig,
              EmissionDerivedPeierlsTaylorModel,
          )
          assert af.__version__ == '0.9.6'
          assert EmissionDerivedPeierlsTaylorModel.__module__.endswith('v96')
          m = EmissionDerivedPeierlsTaylorModel(EmissionDerivedPeierlsTaylorConfig())
          rho = np.logspace(12, 17, 10)
          z = m.rates(0.0, rho, 700.0, 2.74e-10)
          assert np.all(z['equivalent_plastic_rate_s'] == 0.0)
          assert not bool(np.asarray(z['constitutive_caps_active']))
          print('version:', af.__version__)
          print('active PT:', EmissionDerivedPeierlsTaylorModel.__module__)
          PY

      - name: Run uncapped constitutive smoke
        run: |
          python audit_mpz_v9_6_uncapped_pt.py \
            --classes 'ceramic DBTT' \
            --temperatures '300 900 1200' \
            --strain-rates '1e-5' \
            --rho-points 25 \
            --out runs/ci_v96_uncapped_pt
          test -s runs/ci_v96_uncapped_pt/uncapped_pt_summary.csv

      - name: Run broad DBTT-map smoke
        shell: bash
        run: |
          cat > /tmp/v96_atlas.csv <<'CSV'
          candidate_id,region,emit_G00_eV,emit_gT_eV_per_K,emit_sigc0_GPa,emit_sT_GPa_per_K,emit_exp_a,emit_exp_n,emit_floor_frac,cleave_G00_eV,cleave_gT_eV_per_K,cleave_sigc0_GPa,cleave_sT_GPa_per_K,cleave_exp_a,cleave_exp_n,cleave_floor_frac,cleave_S_hs_kB,refined_Kc_T300,refined_Kc_T700,refined_Kc_T900,refined_Kc_T1200
          a1,DBTT_precursor,2.2,0.0012,3.7,0.0022,0.10,0.84,0.035,2.8,0.0045,4.1,0.0001,0.59,1.2,0.0026,7.0,15,14,11,8
          a2,weakT_intrinsic,1.5,0.0085,0.95,0.0010,0.50,0.84,0.031,2.5,0.0016,4.0,0.0027,0.84,1.49,0.0048,0.1,12,12,12,11
          CSV
          python search_mpz_v9_6_broad_dbtt_map.py \
            --prepared-atlas /tmp/v96_atlas.csv \
            --canonical mpz_v9_6_canonical_first_passage_references.csv \
            --pt-samples 2 --max-intrinsic 2 \
            --temperatures '300 700 900 1200' \
            --out runs/ci_v96_broad_map
          test -s runs/ci_v96_broad_map/broad_dbtt_map_shortlist.csv
          test -s runs/ci_v96_broad_map/canonical_reference_results.csv

      - name: Commit v9.6 source
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm -rf arrhenius_fem_czm.egg-info
          rm -f payload/apply_v96_uncapped.py
          rm -f .github/workflows/apply-v9.6-uncapped-pt.yml
          git add -A
          git commit -m 'Activate uncapped Arrhenius Peierls-Taylor kinetics v9.6'
          git push origin HEAD:main
