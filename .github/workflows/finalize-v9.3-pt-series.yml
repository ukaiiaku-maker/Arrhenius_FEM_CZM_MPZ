name: Finalize MPZ v9.3 PT series coupling

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/finalize-v9.3-pt-series.yml'

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Couple retained release to the sequential PT rate
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          p = Path('arrhenius_fracture/moving_process_zone.py')
          s = p.read_text()
          old = """            glide_rate = float(np.asarray(rates['peierls_rate_s']))
            detrap_rate = float(np.asarray(rates['taylor_completion_rate_s']))
            series_rate = float(np.asarray(rates['series_rate_s']))
            pt_diag = {
                'peierls_rate_s': glide_rate,
                'taylor_single_hit_rate_s': float(np.asarray(rates['taylor_single_hit_rate_s'])),
                'taylor_completion_rate_s': detrap_rate,
"""
          new = """            glide_rate = float(np.asarray(rates['peierls_rate_s']))
            taylor_completion_rate = float(np.asarray(rates['taylor_completion_rate_s']))
            series_rate = float(np.asarray(rates['series_rate_s']))
            # Retained content must complete Taylor depinning and Peierls motion;
            # use the harmonic sequential rate rather than Taylor alone.
            detrap_rate = series_rate
            pt_diag = {
                'peierls_rate_s': glide_rate,
                'taylor_single_hit_rate_s': float(np.asarray(rates['taylor_single_hit_rate_s'])),
                'taylor_completion_rate_s': taylor_completion_rate,
"""
          if old not in s:
              raise SystemExit('moving-PZ PT series patch anchor not found')
          p.write_text(s.replace(old, new, 1))

          t = Path('tests/test_emission_derived_peierls_taylor.py')
          ts = t.read_text()
          test = '''\n\ndef test_moving_pz_retained_release_uses_sequential_pt_rate():\n    from arrhenius_fracture.moving_process_zone import (\n        MovingProcessZoneConfig, MovingProcessZoneState,\n    )\n\n    cfg = MovingProcessZoneConfig(\n        use_emission_derived_pt=True,\n        pt_taylor_corr_rho_c=1.0e11,\n        pt_taylor_renewal_time_s=1.0e-10,\n        pt_taylor_m_cap=22.0,\n    )\n    state = MovingProcessZoneState(cfg)\n    state.retained[0, 0] = 1.0\n    out = state.evolve(\n        1.0e-12, 700.0, 2.0e9, 2.74e-10,\n        emission_hazard_integral=0.0,\n    )\n    assert np.isclose(\n        out["detrap_rate_s"], out["peierls_taylor_series_rate_s"]\n    )\n    assert out["detrap_rate_s"] <= out["peierls_rate_s"] * (1.0 + 1.0e-12)\n    assert out["detrap_rate_s"] <= out["taylor_completion_rate_s"] * (1.0 + 1.0e-12)\n'''
          if 'test_moving_pz_retained_release_uses_sequential_pt_rate' not in ts:
              t.write_text(ts.rstrip() + test + '\n')
          PY

      - name: Install and test
        run: |
          python -m pip install -e '.[dev]'
          python -m compileall -q arrhenius_fracture
          python -m pytest -q \
            tests/test_emission_derived_peierls_taylor.py \
            tests/test_bulk_pt_plasticity.py \
            tests/test_moving_process_zone.py

      - name: Commit finalized coupling
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm -rf arrhenius_fem_czm.egg-info
          rm -f .github/workflows/finalize-v9.3-pt-series.yml
          git add -A
          git commit -m 'Use sequential Peierls-Taylor rate for MPZ release'
          git push origin HEAD:main
