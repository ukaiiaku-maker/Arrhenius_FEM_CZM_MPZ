[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "arrhenius-fem-czm"
version = "10.0.5.12.3"
description = "Arrhenius FEM/CZM solver with repaired live-reporting Phase-C runner"
requires-python = ">=3.10"
dependencies = [
  "numpy>=1.24",
  "scipy>=1.10",
  "matplotlib>=3.7",
  "pandas>=2.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8",
]

[tool.setuptools.packages.find]
include = ["arrhenius_fracture*"]

[tool.setuptools.package-data]
arrhenius_fracture = ["data/mpz_v9_11_1/*.json"]
